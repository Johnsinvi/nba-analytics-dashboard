name: Refresh NBA Data

on:
  schedule:
    - cron: "0 11 * * *"   # 6:00 AM ET (UTC-5)
    - cron: "0 23 * * *"   # 6:00 PM ET (UTC-5)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Fetch NBA data and write CSVs ──────────────────────────────────
      - name: Fetch NBA stats
        run: |
          cd scripts
          python run_all.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 5. Commit updated CSVs back to the repo ───────────────────────────
      - name: Commit updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: refresh NBA data [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      - name: Push changes
        run: git push origin main
