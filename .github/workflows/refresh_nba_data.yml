name: Refresh NBA Data → OneDrive

on:
  schedule:
    - cron: "0 11 * * *"   # 6:00 AM ET (UTC-5)
    - cron: "0 23 * * *"   # 6:00 PM ET (UTC-5)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Fetch NBA data and write CSVs ──────────────────────────────────
      - name: Fetch NBA stats
        run: |
          cd scripts
          python run_all.py
        env:
          # nba_api uses HTTP; no keys needed but set a UA to avoid blocks
          PYTHONUNBUFFERED: "1"

      # ── 5. Upload each CSV to OneDrive via Microsoft Graph API ────────────
      - name: Upload CSVs to OneDrive
        env:
          TENANT_ID:     ${{ secrets.ONEDRIVE_TENANT_ID }}
          CLIENT_ID:     ${{ secrets.ONEDRIVE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          ONEDRIVE_FOLDER: ${{ secrets.ONEDRIVE_FOLDER_PATH }}
        run: python .github/scripts/upload_to_onedrive.py
